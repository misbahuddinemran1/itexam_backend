# App
spring.application.name=exam-platform
server.port=8080
server.servlet.context-path=/api/v1

# Database (PostgreSQL - Render)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
logging.level.com.examplatform=DEBUG
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_batch_fetch_size=20

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Multipart
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Jackson
spring.jackson.time-zone=Asia/Dhaka
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss

# JWT
app.jwt.secret=${JWT_SECRET:exam-platform-secret-key-minimum-256-bits-long-change-in-prod}
app.jwt.expiration-ms=86400000

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# Pagination
app.pagination.default-page-size=20
app.pagination.max-page-size=100